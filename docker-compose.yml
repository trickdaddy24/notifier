services:
  notifier-web:
    build: .
    container_name: notifier-web
    restart: unless-stopped
    # Fronted by Traefik (Saltbox) on the external `saltbox` network — no host
    # port is published. For standalone/local use WITHOUT Traefik, add
    #   ports:
    #     - "8000:8000"
    # back to this service and remove the `saltbox` network below.
    networks:
      - saltbox
      - default
    environment:
      - NOTIFIER_WEB_PASSWORD=${NOTIFIER_WEB_PASSWORD}
      - TIMEZONE=${TIMEZONE:-America/New_York}
      # Database path (matches the volume mount)
      - NOTIFIER_DB_PATH=/app/data/notifications.db
      # Set to "1" to auto-seed demo reminders on first run (dev only)
      # - SEED_SAMPLE_DATA=1

      # Heartbeat settings (sent to Telegram)
      # HEARTBEAT_INTERVAL=6          # Send every N hours (0 = disabled)
      # HEARTBEAT_FILE_LOCATION=/app   # Custom string shown in heartbeat message

    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    healthcheck:
      # python:3.11-slim has no curl — use the bundled Python instead.
      # urlopen raises (non-zero exit) if the app is unreachable.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  # Traefik's network on the Saltbox host. Must already exist
  # (`docker network create saltbox` is managed by Saltbox).
  saltbox:
    external: true
